specification: FinOps Framework
specificationVersion: '1.0'
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: OpenWeatherMap
providerId: openweathermap
publisherName: OpenWeather Ltd
serviceCategory: API
created: '2026-05-29'
modified: '2026-05-29'
tags:
  - Weather
  - Forecast
  - Air Pollution
  - Solar
  - FinOps
  - Cost Management
  - FOCUS
description: FinOps definition for the OpenWeather API surface. Provides a FOCUS-aligned mapping for cost allocation, usage measurement, and unit-economics reporting across the API portfolio. Supports both subscription and pay-per-call pricing models.
principles:
  - name: Visibility
    description: Expose API consumption and cost to engineering, product, and finance teams in near real time.
  - name: Allocation
    description: Tag every chargeable API call with consuming team, environment, application, and feature so cost can be allocated.
  - name: Optimization
    description: Evaluate request patterns, caching, batching, and tier selection to reduce cost per useful unit of work.
  - name: Accountability
    description: Establish budget owners and chargeback or showback flows for each consuming team.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Rate Optimization
      - Workload Optimization
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - FinOps Education and Enablement
      - Invoicing and Chargeback
      - Onboarding Workloads
billingModel:
  pricingCategory: Usage-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: OpenWeatherMap
  ServiceCategory: Developer Tools / Weather Data API
  ProviderName: OpenWeather Ltd
  PublisherName: OpenWeather Ltd
  InvoiceIssuerName: OpenWeather Ltd
  PricingCategory: Usage-Based
  PricingUnit: request
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: api_requests
    description: Count of billable API requests across all OpenWeather APIs.
    unit: request
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - tier
      - region
      - consumer
  - name: one_call_requests
    description: Count of One Call 4.0 requests, used to evaluate the daily free allotment and bill overage.
    unit: request
    aggregation: sum
    dimensions:
      - tier
      - consumer
  - name: data_egress
    description: Bytes returned over the network in API responses, useful for high-volume bulk and tile traffic.
    unit: GB
    aggregation: sum
    dimensions:
      - api
      - region
      - consumer
  - name: bulk_files
    description: Count of bulk file downloads (Bulk Current Data, History Bulk, Solar Bulks).
    unit: file
    aggregation: sum
    dimensions:
      - product
      - period
      - consumer
