unitEconomics:
  - name: Cost per 1K Requests
    metric: billed_cost / (api_requests / 1000)
    target: TBD
  - name: Cost per Active Consumer
    metric: billed_cost / active_consumers
    target: TBD
  - name: One Call Free Allotment Utilization
    metric: one_call_requests_within_free_window / 1000
    target: <= 1.0
  - name: Cost per Forecast Refresh
    metric: billed_cost / forecast_refresh_count
    target: TBD
