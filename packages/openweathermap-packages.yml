source: PyPI, npm registry search, and the OpenWeatherMap GitHub organization (https://github.com/OpenWeatherMap)
note: >-
  OpenWeather does not publish an official REST API client SDK for any language;
  the documented integration path is direct HTTPS calls with the appid API key.
  The organization does publish first-party open-source software: the Deker
  multidimensional-array storage engine (used internally for weather time series,
  released on PyPI) and Leaflet map-tile layer plugins (GitHub source, not on npm).
  Community client libraries exist but are third-party (official: false).
