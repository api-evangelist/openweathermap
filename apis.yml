aid: openweathermap
name: OpenWeatherMap
description: OpenWeather (operating openweathermap.org) is a global weather data platform
  delivering current weather, multi-horizon forecasts, historical archives, climate
  statistics, air pollution, solar irradiance, road risk, geocoding, and weather map
  tiles. Data is sourced from satellites, weather models, radars, and a worldwide
  network of weather stations, served through REST APIs across a freemium, multi-tier,
  and pay-per-call commercial model.
url: https://openweathermap.org/api
specificationVersion: '0.20'
created: '2026-05-28'
modified: '2026-05-29'
x-source: public-apis/public-apis
x-category: Weather
x-tier: 2
x-tier-reason: comprehensive-weather-suite-with-multi-tier-pricing
image: https://openweathermap.org/themes/openweathermap/assets/img/logo_white_cropped.png
tags:
- Weather
- Forecast
- Climate
- Air Pollution
- Air Quality
- Solar
- Geocoding
- History
- Maps
- Road Risk
- Public APIs
