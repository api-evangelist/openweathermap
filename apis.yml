- type: Features
  name: Features
  data:
  - name: Global Weather Coverage
    description: Real-time and forecast weather for any latitude/longitude on Earth.
  - name: Long-Range Historical Archive
    description: Over 47 years of historical weather observations available via History,
      One Call 4.0, and Statistical APIs.
  - name: Air Quality Telemetry
    description: AQI plus eight pollutant concentrations covering current, forecast,
      and historical air pollution.
  - name: Solar Energy Modeling
    description: GHI, DNI, DHI irradiance and per-panel power output predictions for
      solar projects.
  - name: Map Tile Overlays
    description: Direct integration with Leaflet, OpenLayers, and Google Maps via
      raster tile layers.
  - name: Pay-Per-Call One Call 4.0
    description: First 1,000 daily One Call requests free; additional calls billed
      per call for flexible cost control.
  - name: Multi-Tier Subscriptions
    description: Free, Startup, Developer, Professional, Expert, and Enterprise tiers
      tuned for varying volume and SLA.
  - name: Personal Weather Stations
    description: Register stations, submit measurements, and retrieve aggregated readings.
  - name: Road and Route Risk
    description: Per-waypoint weather and road surface state with severity-tagged
      alerts for routing.
  - name: Multi-Lingual Output
    description: Forecast and condition text returned in 40 plus languages.
- type: UseCases
  name: Use Cases
  data:
  - name: Consumer Weather Apps
    description: Power mobile and web weather apps with current, forecast, and alert
      data.
  - name: Logistics and Routing
    description: Use Road Risk and forecast data to optimize fleet routing and arrival
      times.
  - name: Energy and Utilities
    description: Forecast solar generation and demand with solar irradiance and panel
      energy prediction APIs.
  - name: Agriculture
    description: Use accumulated temperature and precipitation data to inform irrigation,
      planting, and harvest decisions.
  - name: Insurance and Risk
    description: Combine historical and statistical weather with air quality and road
      risk to underwrite and adjudicate claims.
  - name: Smart City and Air Quality
    description: Surface AQI and pollutant concentrations in civic dashboards and
      citizen notification systems.
  - name: Outdoor and Travel
    description: Embed weather data in trip planning, ski resort, sailing, and outdoor
      recreation experiences.
  - name: Aviation and Maritime
    description: Use high-frequency forecast and wind data for flight planning and
      marine operations.
- type: Integrations
  name: Integrations
  data:
  - name: Leaflet
    description: Weather Maps 1.0 tile layers render directly inside Leaflet maps.
  - name: OpenLayers
    description: Tile layers compatible with OpenLayers raster sources.
  - name: Google Maps
    description: Weather tiles can be added as overlays in Google Maps.
  - name: Home Assistant
    description: OpenWeather integration is a first-class weather provider in the
      Home Assistant ecosystem.
  - name: Node-RED
    description: Numerous community Node-RED nodes wrap the OpenWeather APIs.
  - name: Power BI and Tableau
    description: REST connectors and community templates ingest OpenWeather data for
      analytics dashboards.
  - name: Model Context Protocol Servers
    description: Multiple community MCP servers (NimbleBrainInc, robertn702, fgladisch,
      jezweb, SaintDoresh, tristau) expose OpenWeather data to MCP-compatible agents
      and Claude.
  - name: Claude Code Skills
    description: ForecastSkill and OpenWeather API Automation skills add weather capabilities
      to Claude Code workflows.
- type: Solutions
  name: Solutions
  data:
  - name: VANE Geospatial Platform
    description: OpenWeather's geospatial platform for working with weather grids
      and time series.
  - name: Deker Storage Engine
    description: OpenWeather's open-source multidimensional array storage engine used
      internally for weather time series.
  - name: Marketplace Bulk Data
    description: Bulk history, forecast, solar, and tile downloads for analytics and
      ML pipelines.
  - name: Enterprise SLAs
    description: Contractual SLAs with dedicated account management and data residency
      options.
- type: KubernetesCRD
  name: Kubernetes Custom Resources
  description: No first-party Kubernetes CRDs are published. Skipped.
- type: Tools
  name: Tools and Ecosystem
  data:
  - name: OpenWeatherMap MCP Server (NimbleBrainInc)
    description: Production-ready MCP server for OpenWeather with hybrid tools and
      graceful degradation.
  - name: mcp-openweathermap (robertn702)
    description: Node.js/TypeScript MCP server covering current weather, forecasts,
      geocoding, alerts.
  - name: openweathermap-mcp-server (fgladisch)
    description: NestJS-based MCP server exposing OpenWeather data to MCP-compatible
      agent frameworks.
  - name: weather-mcp-server (jezweb)
    description: Python FastMCP-based weather MCP server backed by OpenWeather.
  - name: Weather-MCP-ClaudeDesktop (SaintDoresh)
    description: MCP tool for Claude Desktop with real-time, forecast, and historical
      OpenWeather data.
  - name: openweathermap-mcp (tristau)
    description: Lightweight MCP server requiring the OpenWeather API key as a CLI
      argument.
  - name: ForecastSkill (kevinl95)
    description: Claude Skill for OpenWeather forecasts inside Claude conversations.
  - name: OpenWeather API Automation Skill (MCPmarket)
    description: Claude Code skill that automates OpenWeather API interactions via
      the Rube MCP and Composio toolkit.
  - name: Awesome OpenWeather
    description: Curated list of OpenWeather resources maintained on GitHub.
  - name: leaflet-weather-layer
    description: OpenWeather-published Leaflet layer for weather tile overlays.
  - name: leaflet-coupled-layers
    description: OpenWeather-published Leaflet plugin for coupled tile layer controls.
  - name: weatherchecker-go
    description: Open-source Go utility from OpenWeather to compare weather providers.
  - name: choose-a-period
    description: OpenWeather UI component for selecting time periods.
